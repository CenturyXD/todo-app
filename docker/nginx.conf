server {
    listen 8080;
    server_name localhost;
    root /var/www/html/public; # Root ของ Laravel
    index index.php;

    # 1. API Requests -> ให้ Laravel จัดการ
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. Frontend Requests -> ให้ Next.js จัดการ
    # (ยกเว้น /api, /storage และไฟล์ php)
    location / {
        # ถ้ามีไฟล์จริง (เช่น favicon) ให้เสิร์ฟเลย ถ้าไม่มีให้ส่งไป Next.js
        try_files $uri @nextjs;
    }

    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Config สำหรับ PHP
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}